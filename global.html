<!DOCTYPE html>
<html>
<head>
<title>Global Variable</title>
</head>

<body>

<h2>Global Variable Example</h2>

<script>

let a = 20;   // Global variable
let b = 10;   // Global variable

function calculate()
{
    let add = a + b;
    

    document.write("Addition = " + add );
    
}

calculate();

</script>

</body>
</html>
