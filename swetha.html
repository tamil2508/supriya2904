<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Card</title>

    <style>
        /* Element Selector */
        body{
            background-color: #e6f7ff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Class Selector */
        .card{
            width: 350px;
            background-color: white;
            border: 2px solid #333;
            border-radius: 20px;
            box-shadow: 0px 4px 12px gray;
            padding: 20px;
            margin: 20px;
            text-align: center;
            position: relative;
        }

        .profile-img{
            width: 120px;
            height: 120px;
            border-radius: 10%;
            border: 4px solid pink;
            margin-bottom: 15px;
        }

        h2{
            color: red;
            font-family: Georgia, serif;
        }

        p{
            color: blue;
            font-size: 16px;
            text-align: left;
        }

        /* ID Selector */
        #viewBtn{
            background-color: #28a745;
            color: white;
        }

        #contactBtn{
            background-color: #ff9800;
            color: white;
        }

        button{
            border: none;
            padding: 10px 15px;
            margin: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        #viewBtn:hover{
            background-color: #1e7e34;
        }

        #contactBtn:hover{
            background-color: #e67e00;
        }

        /* Topper Badge */
        .badge{
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: red;
            color: yellow;
            padding: 5px 10px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="badge">TOPPER</div>

        <img src="https://via.placeholder.com/120"
             alt="Student Image"
             class="profile-img">

        <h2>Student Profile</h2>

        <p><b>Name:</b> Thenmoli.M</p>
        <p><b>Department:</b> B.Sc Computer Science</p>
        <p><b>College Name:</b> ABC Arts and Science College</p>
        <p><b>Email:</b> thenmolimurugan2007@gmail.com</p>
        <p><b>Phone:</b> 7418252821</p>

        <button id="viewBtn">View Profile</button>
        <button id="contactBtn">Contact</button>

    </div>

</body>
</html>
